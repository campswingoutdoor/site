name: Keep Koyeb Awake

on:
  schedule:
    - cron: '*/20 * * * *'   # 매 20분마다 (UTC)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            "${{ vars.KOYEB_URL }}/api/v1/health"
