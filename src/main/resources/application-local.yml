spring:
  thymeleaf:
    cache: false

settings:
  cache:
    # 로컬: 5초마다 갱신 (batchGet 1회 호출 = 12 req/min, quota 60/min 대비 20%).
    # 시트 수정 후 5초 내 반영. dev 흐름 최적화.
    refresh-interval-ms: 5000

logging:
  level:
    com.campswing: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
