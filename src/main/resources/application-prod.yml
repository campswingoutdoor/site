spring:
  thymeleaf:
    cache: true

settings:
  cache:
    # 운영: 5초 주기 (batchGet 1회 호출 = 12 req/min, quota 60/min 대비 20%).
    # 단일 서버 가정 — 인스턴스 N대로 확장 시 (6*N) req/min이 quota를 넘지 않는지 재검토 필요.
    # 갱신 1회당 약 6회 읽기(batchGet 1 + 개별 5). 60초 주기 → 분당 약 6회 (quota 60/min 대비 여유).
    # 운영자 시트 수정 후 최대 60초 내 반영.
    # SETTINGS_CACHE_REFRESH_INTERVAL_MS 환경변수로 런타임에 오버라이드 가능.
    refresh-interval-ms: ${SETTINGS_CACHE_REFRESH_INTERVAL_MS:60000}

server:
  forward-headers-strategy: native

logging:
  level:
    com.campswing: INFO
    root: WARN
