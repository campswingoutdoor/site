spring:
  application:
    name: camp-swing-outdoor
  thymeleaf:
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

event:
  name: "Camp Swing Outdoor 2026"
  start-date: "2026-10-30"
  end-date: "2026-10-31"
  main-venue:
    name: "상주우산오토캠핑장"
    address: "경북 상주시 외서면 우산리 223-3"
  pre-party-venue:
    name: "느티나무 카페"
    address: ""

google:
  sheets:
    spreadsheet-id: ${GOOGLE_SHEET_ID:}
    credentials-location: ${GOOGLE_APPLICATION_CREDENTIALS:}
    credentials-json: ${GOOGLE_CREDENTIALS_JSON:}
    timeout-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
