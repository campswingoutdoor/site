<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageMeta?.title}">Invited Dancers</title>
</head>
<body>
<main layout:fragment="content">

    <section class="section-py">
        <div class="container-page max-w-5xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3"
               th:text="${pageMeta?.badge}">INVITED DANCERS</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-16"
                th:text="${pageMeta?.h1}">Invited Dancers</h1>

            <!-- ===== Legacy Dancers ===== -->
            <div class="mb-16">
                <h2 class="font-heading text-2xl md:text-3xl text-gold-light mb-2">Legacy Dancers</h2>
                <div class="w-16 h-px bg-gold/40 mb-8"></div>

                <!-- Coming Soon placeholder -->
                <div th:if="${#lists.isEmpty(legacyDancers)}" class="card p-12 text-center max-w-2xl mx-auto">
                    <p class="font-display tracking-[0.4em] text-text-muted text-sm mb-3" th:text="${legacyComingSoon?.label}">COMING SOON</p>
                    <p class="text-text-muted" th:text="${legacyComingSoon?.message}">초대 댄서 라인업이 곧 공개될 예정입니다.</p>
                </div>

                <!-- 데이터가 있을 때 -->
                <div th:unless="${#lists.isEmpty(legacyDancers)}"
                     class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <article th:each="d : ${legacyDancers}" class="card overflow-hidden">
                        <img th:src="@{${d.profileImagePath}}"
                             th:alt="${d.name}"
                             class="w-full aspect-[3/4] object-cover" />
                        <div class="p-6 text-center">
                            <p class="font-heading text-xl text-gold mb-1" th:text="${d.name}">댄서명</p>
                            <p class="text-text-muted text-sm" th:text="${d.role}">역할</p>
                            <p th:if="${d.bio != null and !d.bio.isBlank()}"
                               class="text-text-muted text-sm mt-3 leading-relaxed"
                               th:text="${d.bio}"></p>
                        </div>
                    </article>
                </div>
            </div>

            <!-- ===== Special Guest Dancers ===== -->
            <div>
                <h2 class="font-heading text-2xl md:text-3xl text-gold-light mb-2">Special Guest Dancers</h2>
                <div class="w-16 h-px bg-gold/40 mb-8"></div>

                <!-- Coming Soon placeholder -->
                <div th:if="${#lists.isEmpty(specialGuestDancers)}" class="card p-12 text-center max-w-2xl mx-auto">
                    <p class="font-display tracking-[0.4em] text-text-muted text-sm mb-3" th:text="${specialComingSoon?.label}">COMING SOON</p>
                    <p class="text-text-muted" th:text="${specialComingSoon?.message}">스페셜 게스트 댄서가 곧 공개될 예정입니다.</p>
                </div>

                <!-- 데이터가 있을 때 -->
                <div th:unless="${#lists.isEmpty(specialGuestDancers)}"
                     class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <article th:each="d : ${specialGuestDancers}" class="card overflow-hidden">
                        <img th:src="@{${d.profileImagePath}}"
                             th:alt="${d.name}"
                             class="w-full aspect-[3/4] object-cover" />
                        <div class="p-6 text-center">
                            <p class="font-heading text-xl text-gold mb-1" th:text="${d.name}">댄서명</p>
                            <p class="text-text-muted text-sm" th:text="${d.role}">역할</p>
                            <p th:if="${d.bio != null and !d.bio.isBlank()}"
                               class="text-text-muted text-sm mt-3 leading-relaxed"
                               th:text="${d.bio}"></p>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>

</main>
</body>
</html>
