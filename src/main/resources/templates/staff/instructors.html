<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>강사 소개</title>
</head>
<body>
<main layout:fragment="content">

    <section class="section-py">
        <div class="container-page max-w-5xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3">INSTRUCTORS</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-12">강사 소개</h1>

            <!-- Coming Soon placeholder -->
            <div th:if="${#lists.isEmpty(instructors)}" class="card p-12 text-center max-w-2xl mx-auto">
                <p class="font-display tracking-[0.4em] text-text-muted text-sm mb-3">COMING SOON</p>
                <p class="text-text-muted">스윙 댄스 워크숍 강사 라인업이 곧 공개될 예정입니다.</p>
                <p class="text-text-muted text-xs mt-4">SNS @campswingoutdoor 에서 가장 먼저 안내합니다.</p>
            </div>

            <!-- 데이터가 있을 때 -->
            <div th:unless="${#lists.isEmpty(instructors)}"
                 class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <article th:each="ins : ${instructors}" class="card overflow-hidden">
                    <img th:src="@{${ins.profileImagePath}}"
                         th:alt="${ins.name}"
                         class="w-full aspect-[3/4] object-cover" />
                    <div class="p-6 text-center">
                        <p class="font-heading text-xl text-gold mb-1" th:text="${ins.name}">강사명</p>
                        <p class="text-text-muted text-sm" th:text="${ins.role}">역할</p>
                        <p th:if="${ins.bio != null and !ins.bio.isBlank()}"
                           class="text-text-muted text-sm mt-3 leading-relaxed"
                           th:text="${ins.bio}"></p>
                    </div>
                </article>
            </div>
        </div>
    </section>

</main>
</body>
</html>
