<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title layout:title-pattern="$CONTENT_TITLE | Camp Swing Outdoor">Camp Swing Outdoor</title>
    <th:block th:insert="~{layout/fragments/meta :: og}"></th:block>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <link rel="icon" th:href="@{/favicon.ico}" />
</head>
<body class="bg-bg-primary text-text font-body">
    <div th:replace="~{layout/fragments/header :: header}"></div>

    <main layout:fragment="content" class="min-h-screen"></main>

    <div th:replace="~{layout/fragments/footer :: footer}"></div>

    <script th:src="@{/js/alpine.min.js}" defer></script>
    <script th:src="@{/js/app.js}" defer></script>
</body>
</html>
