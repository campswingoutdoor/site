<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>바로 신청하기</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-5xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3">APPLY</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6">바로 신청하기</h1>
            <p class="text-center text-text-muted mb-12">
                참가 형태에 맞는 신청 폼을 선택해주세요. 모든 참가자는 파티패스를 신청해야 하며,
                숙박이 필요한 경우 캠핑사이트 또는 도미토리를 추가로 신청합니다.
            </p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

                <a th:href="@{/party-pass}" class="card overflow-hidden group transition hover:border-gold/60 hover:shadow-glow">
                    <div class="aspect-[4/3] bg-cover bg-center transition group-hover:scale-105"
                         style="background-image: linear-gradient(rgba(11,20,38,0.0) 50%, rgba(11,20,38,0.9)), url('/img/venue-preparty.jpeg');"></div>
                    <div class="p-6">
                        <p class="font-display text-gold tracking-[0.3em] text-xs mb-2">STEP 1</p>
                        <h3 class="font-heading text-xl text-gold mb-2">파티패스</h3>
                        <p class="text-text-muted text-sm">전야제 + 메인 행사 입장 패스</p>
                    </div>
                </a>

                <a th:href="@{/lodging/campsite}" class="card overflow-hidden group transition hover:border-gold/60 hover:shadow-glow">
                    <div class="aspect-[4/3] bg-cover bg-center transition group-hover:scale-105"
                         style="background-image: linear-gradient(rgba(11,20,38,0.0) 50%, rgba(11,20,38,0.9)), url('/img/venue-intro.jpeg');"></div>
                    <div class="p-6">
                        <p class="font-display text-gold tracking-[0.3em] text-xs mb-2">STEP 2 · A</p>
                        <h3 class="font-heading text-xl text-gold mb-2">캠핑사이트</h3>
                        <p class="text-text-muted text-sm">본인 텐트로 야영하는 분</p>
                    </div>
                </a>

                <a th:href="@{/lodging/dormitory}" class="card overflow-hidden group transition hover:border-gold/60 hover:shadow-glow">
                    <div class="aspect-[4/3] bg-cover bg-center transition group-hover:scale-105"
                         style="background-image: linear-gradient(rgba(11,20,38,0.0) 50%, rgba(11,20,38,0.9)), url('/img/hero-full.jpeg');"></div>
                    <div class="p-6">
                        <p class="font-display text-gold tracking-[0.3em] text-xs mb-2">STEP 2 · B</p>
                        <h3 class="font-heading text-xl text-gold mb-2">도미토리</h3>
                        <p class="text-text-muted text-sm">공용 숙소로 편하게 묵는 분</p>
                    </div>
                </a>

            </div>
        </div>
    </section>
</main>
</body>
</html>
