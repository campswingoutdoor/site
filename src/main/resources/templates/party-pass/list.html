<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageMeta?.title}">파티패스 신청 확인</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3"
               th:text="${pageMeta?.badge}">APPLICATION LIST</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-4"
                th:text="${pageMeta?.h1}">파티패스 신청 확인</h1>
            <p class="text-center text-text-muted mb-8">
                현재까지 등록된 파티패스 신청 내역입니다.
                <span class="text-gold-light"> 총 <span th:text="${#lists.size(items)}">0</span>건</span>
            </p>

            <div class="flex justify-end mb-4">
                <a th:href="@{/party-pass}" class="btn-outline-gold">← 신청 폼으로 돌아가기</a>
            </div>

            <!-- 신청자 없음 -->
            <div th:if="${#lists.isEmpty(items)}"
                 class="card p-10 text-center text-text-muted">
                아직 등록된 신청이 없습니다.
            </div>

            <!-- 테이블 -->
            <div th:unless="${#lists.isEmpty(items)}"
                 class="card overflow-x-auto">
                <table class="w-full min-w-[1200px] text-sm">
                    <thead class="border-b border-gold/40 bg-gold/5">
                    <tr class="text-gold font-heading text-left">
                        <th class="px-4 py-3 whitespace-nowrap">순번</th>
                        <th class="px-4 py-3 whitespace-nowrap">신청일시</th>
                        <th class="px-4 py-3 whitespace-nowrap">이름</th>
                        <th class="px-4 py-3 whitespace-nowrap">닉네임</th>
                        <th class="px-4 py-3 whitespace-nowrap">패스종류</th>
                        <th class="px-4 py-3 whitespace-nowrap">소속 동호회</th>
                        <th class="px-4 py-3 whitespace-nowrap">역할</th>
                        <th class="px-4 py-3 whitespace-nowrap">워크숍</th>
                        <th class="px-4 py-3 whitespace-nowrap">차량(주차)</th>
                        <th class="px-4 py-3 whitespace-nowrap">등급</th>
                        <th class="px-4 py-3 whitespace-nowrap">결제금액</th>
                        <th class="px-4 py-3 w-64 min-w-[12rem] whitespace-nowrap">메모</th>
                        <th class="px-4 py-3 whitespace-nowrap">상태</th>
                        <th class="px-4 py-3 whitespace-nowrap">비고</th>
                    </tr>
                    </thead>
                    <tbody class="text-text [&_td]:align-top">
                    <tr th:each="row : ${items}"
                        class="border-b border-gold/10 hover:bg-gold/5 transition">
                        <td class="px-4 py-3 text-text-muted whitespace-nowrap" th:text="${row.seq}">1</td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.submittedAt}">2026-05-14 12:34</td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.realName}">홍길동</td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.nickname}">길동</td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.passType}">FULL</td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.club}"></td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.role}">LEADER</td>
                        <td class="px-4 py-3 whitespace-nowrap"
                            th:text="${#strings.equalsIgnoreCase(row.applyWorkshop, 'TRUE') ? '신청' : '미신청'}">미신청</td>
                        <td class="px-4 py-3 whitespace-nowrap"
                            th:text="${#strings.equalsIgnoreCase(row.vehicleUsage, 'NONE') or row.vehicleUsage == '' ? '미이용'
                                       : (row.vehicleNumber == ''
                                          ? (#strings.equalsIgnoreCase(row.vehicleUsage, 'CAMPSITE') ? '캠핑(무료)' : '일반')
                                          : row.vehicleNumber)}">미이용</td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <span th:if="${row.priceTier != null and !row.priceTier.isEmpty()}"
                                  class="inline-block px-2.5 py-1 rounded-full text-xs font-semibold"
                                  th:classappend="${#strings.equalsIgnoreCase(row.priceTier, 'EARLYBIRD') ? 'bg-green-500 text-bg-primary'
                                                : (#strings.equalsIgnoreCase(row.priceTier, 'ONSITE') ? 'bg-gold text-bg-primary'
                                                : (#strings.equalsIgnoreCase(row.priceTier, 'STANDARD') ? 'bg-gray-400 text-bg-primary' : 'bg-gray-600 text-white'))}"
                                  th:text="${#strings.equalsIgnoreCase(row.priceTier, 'EARLYBIRD') ? '얼리버드'
                                             : (#strings.equalsIgnoreCase(row.priceTier, 'ONSITE') ? '현장'
                                             : (#strings.equalsIgnoreCase(row.priceTier, 'STANDARD') ? '일반' : row.priceTier))}">얼리버드</span>
                            <span th:unless="${row.priceTier != null and !row.priceTier.isEmpty()}" class="text-text-muted">-</span>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap" th:text="${row.totalPrice == '' ? '' : row.totalPrice + '원'}">0원</td>
                        <td class="px-4 py-3 text-text-muted w-64 min-w-[12rem] max-w-xs whitespace-normal break-words" th:text="${row.memo}"></td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <span th:if="${row.status != null and !row.status.isEmpty()}"
                                  class="inline-block px-2.5 py-1 rounded-full text-xs font-semibold"
                                  th:classappend="${(#strings.contains(row.status, '대기') or #strings.contains(row.status, '미입금')) ? 'bg-amber-500 text-bg-primary'
                                                : (#strings.contains(row.status, '입금') ? 'bg-green-500 text-bg-primary'
                                                : (#strings.contains(row.status, '취소') ? 'bg-pink-500 text-white'
                                                : (#strings.contains(row.status, '환불') ? 'bg-purple-500 text-white'
                                                : ((#strings.contains(row.status, '스태프') or #strings.contains(row.status, '스테프')) ? 'bg-blue-500 text-white'
                                                : (#strings.contains(row.status, '초대') ? 'bg-red-500 text-white'
                                                : (#strings.contains(row.status, '완료') ? 'bg-gray-400 text-bg-primary' : 'bg-gray-600 text-white'))))))}"
                                  th:text="${row.status}">상태</span>
                            <span th:unless="${row.status != null and !row.status.isEmpty()}" class="text-text-muted">-</span>
                        </td>
                        <!-- 비고: 얼리버드는 5,000원 할인 (시트와 무관하게 priceTier 기반 서버 렌더) -->
                        <td class="px-4 py-3 whitespace-nowrap">
                            <span th:if="${#strings.equalsIgnoreCase(row.priceTier, 'EARLYBIRD')}"
                                  class="text-gold-light">5,000원 할인</span>
                            <span th:unless="${#strings.equalsIgnoreCase(row.priceTier, 'EARLYBIRD')}"
                                  class="text-text-muted">-</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>
</body>
</html>
