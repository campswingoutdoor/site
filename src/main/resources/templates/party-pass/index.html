<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageMeta?.title}">파티패스 안내·신청</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-3xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3"
               th:text="${pageMeta?.badge}">PARTY PASS</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6"
                th:text="${pageMeta?.h1}">파티패스 안내·신청</h1>
            <p class="text-center text-text-muted mb-12">
                전야제 BLUES PARTY와 토요일 메인 행사를 함께 즐길 수 있는 통합 패스입니다.
            </p>

            <!-- 안내 -->
            <div class="card p-6 mb-10" th:if="${!#lists.isEmpty(benefits)}">
                <h2 class="font-heading text-lg text-gold mb-3">포함 사항</h2>
                <ul class="text-sm text-text-muted space-y-1 list-disc list-inside">
                    <li th:each="b : ${benefits}" th:text="${b.text}">혜택 항목</li>
                </ul>
            </div>

            <!-- 폼 -->
            <form th:action="@{/party-pass}" th:object="${form}" method="post" class="space-y-6 card p-6 md:p-8">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div>
                    <label class="field-label" for="applicantName">이름(닉네임) *</label>
                    <input id="applicantName" type="text" class="input-field" th:field="*{applicantName}" autocomplete="name" />
                    <p class="field-error" th:if="${#fields.hasErrors('applicantName')}" th:errors="*{applicantName}"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="phone">연락처 *</label>
                        <input id="phone" type="tel" class="input-field" placeholder="010-1234-5678"
                               th:field="*{phone}" autocomplete="tel" />
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="email">이메일 *</label>
                        <input id="email" type="email" class="input-field" th:field="*{email}" autocomplete="email" />
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                </div>

                <div>
                    <label class="field-label">패스 종류 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="t : ${passTypes}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{passType}" th:value="${t}" />
                            <span class="inline-block px-4 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:switch="${t.name()}">
                                <span th:case="'FULL'">FULL (전야제 + 메인)</span>
                                <span th:case="'PRE_PARTY_ONLY'">PRE-PARTY ONLY</span>
                                <span th:case="'MAIN_ONLY'">MAIN ONLY</span>
                            </span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('passType')}" th:errors="*{passType}"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="partySize">인원 *</label>
                        <input id="partySize" type="number" min="1" max="6" class="input-field" th:field="*{partySize}" />
                        <p class="field-error" th:if="${#fields.hasErrors('partySize')}" th:errors="*{partySize}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="tshirtSize">티셔츠 사이즈 *</label>
                        <select id="tshirtSize" class="input-field" th:field="*{tshirtSize}">
                            <option th:each="s : ${tshirtSizes}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('tshirtSize')}" th:errors="*{tshirtSize}"></p>
                    </div>
                </div>

                <div>
                    <label class="field-label" for="dietaryNote">식이 제한 · 알레르기</label>
                    <input id="dietaryNote" type="text" class="input-field" th:field="*{dietaryNote}" />
                    <p class="field-error" th:if="${#fields.hasErrors('dietaryNote')}" th:errors="*{dietaryNote}"></p>
                </div>

                <div>
                    <label class="field-label" for="memo">추가 요청</label>
                    <textarea id="memo" rows="3" class="input-field" th:field="*{memo}"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}"></p>
                </div>

                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="mt-1 w-4 h-4 accent-gold" th:field="*{agreedToTerms}" />
                    <span class="text-sm text-text-muted">
                        개인정보 수집·이용에 동의합니다.<br />
                        <span class="text-xs">수집 항목: 이름, 연락처, 이메일 · 보유 기간: 행사 종료 후 90일.</span>
                    </span>
                </label>
                <p class="field-error" th:if="${#fields.hasErrors('agreedToTerms')}" th:errors="*{agreedToTerms}"></p>

                <div class="pt-4 flex flex-col md:flex-row md:justify-between gap-3">
                    <button type="submit" class="btn-cta w-full md:w-auto md:px-16">신청 제출</button>
                    <a th:href="@{/party-pass/list}" class="btn-outline-gold w-full md:w-auto md:px-16 text-center">신청확인</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
