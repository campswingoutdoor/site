<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageMeta?.title}">파티패스 안내·신청</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-3xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3"
               th:text="${pageMeta?.badge}">PARTY PASS</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6"
                th:text="${pageMeta?.h1}">파티패스 안내·신청</h1>
            <p class="text-center text-text-muted mb-12">
                전야제 BLUES PARTY와 토요일 메인 행사를 함께 즐길 수 있는 통합 패스입니다.
            </p>

            <!-- 안내 -->
            <div class="card p-6 mb-10" th:if="${!#lists.isEmpty(benefits)}">
                <h2 class="font-heading text-lg text-gold mb-3">안내 사항</h2>
                <ul class="text-sm text-text-muted space-y-1 list-disc list-inside">
                    <li th:each="b : ${benefits}" th:text="${b.text}">혜택 항목</li>
                </ul>
            </div>

            <!-- 입금 계좌 -->
            <div th:replace="~{layout/fragments/deposit-account :: deposit}"></div>

            <!-- 폼 -->
            <form th:action="@{/party-pass}" th:object="${form}" method="post" class="space-y-6 card p-6 md:p-8"
                  th:attr="x-data='{ useVehicle: ' + ${form.useVehicle == true} + ' }'">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- 1. 이름(실명) / 2. 닉네임 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="realName">이름(실명) *</label>
                        <input id="realName" type="text" class="input-field" th:field="*{realName}" autocomplete="name" />
                        <p class="field-error" th:if="${#fields.hasErrors('realName')}" th:errors="*{realName}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="nickname">닉네임 *</label>
                        <input id="nickname" type="text" class="input-field" th:field="*{nickname}" autocomplete="nickname" />
                        <p class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></p>
                    </div>
                </div>

                <!-- 3. 연락처 / 4. 이메일 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="phone">연락처 *</label>
                        <input id="phone" type="tel" class="input-field" placeholder="010-1234-5678"
                               th:field="*{phone}" autocomplete="tel" />
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="email">이메일 <span class="text-text-muted text-xs">(선택)</span></label>
                        <input id="email" type="email" class="input-field" th:field="*{email}" autocomplete="email" />
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                </div>

                <!-- 5. 패스 종류 -->
                <div>
                    <label class="field-label">패스 종류 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="t : ${passTypes}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{passType}" th:value="${t}" />
                            <span class="inline-block px-4 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:switch="${t.name()}">
                                <span th:case="'FULL'">Full Pass (전야제 + 메인파티)</span>
                                <span th:case="'PRE_PARTY_ONLY'">Pre-Party Only (전야제)</span>
                                <span th:case="'MAIN_ONLY'">Main Party Only (메인파티)</span>
                            </span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('passType')}" th:errors="*{passType}"></p>
                </div>

                <!-- 6. 소속 동호회 -->
                <div>
                    <label class="field-label" for="club">소속 동호회</label>
                    <input id="club" type="text" class="input-field" placeholder="소속 동호회를 입력해주세요" th:field="*{club}" />
                    <p class="field-error" th:if="${#fields.hasErrors('club')}" th:errors="*{club}"></p>
                </div>

                <!-- 7. 역할 -->
                <div>
                    <label class="field-label">역할 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="r : ${roles}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{role}" th:value="${r}" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:text="${r.name() == 'LEADER' ? 'Leader' : 'Follower'}"></span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></p>
                </div>

                <!-- 8. 차량 이용 여부 -->
                <div>
                    <label class="field-label">차량 이용 여부</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{useVehicle}" value="false"
                                   @change="useVehicle = false" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">차량 이용 안 함</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{useVehicle}" value="true"
                                   @change="useVehicle = true" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">차량 이용</span>
                        </label>
                    </div>
                </div>

                <!-- 9. 차량번호 (차량 이용 시) -->
                <div x-show="useVehicle" x-cloak>
                    <label class="field-label" for="vehicleNumber">차량번호</label>
                    <input id="vehicleNumber" type="text" class="input-field" placeholder="예: 12가 3456" th:field="*{vehicleNumber}" />
                    <p class="field-error" th:if="${#fields.hasErrors('vehicleNumber')}" th:errors="*{vehicleNumber}"></p>
                    <div class="mt-3 text-xs text-text-muted space-y-1">
                        <p>※ 차량 1대당 주차비 5,000원이 부과됩니다.</p>
                        <p>※ 캠핑사이트 신청자는 차량 1대 무료입니다.</p>
                        <p>※ 카풀의 경우 메인 운전자의 차량만 등록해 주세요.</p>
                    </div>
                </div>

                <!-- 10. 식이 제한 · 알레르기 -->
                <div>
                    <label class="field-label" for="dietaryNote">식이 제한 · 알레르기</label>
                    <input id="dietaryNote" type="text" class="input-field" th:field="*{dietaryNote}" />
                    <p class="field-error" th:if="${#fields.hasErrors('dietaryNote')}" th:errors="*{dietaryNote}"></p>
                </div>

                <!-- 11. 추가 요청 -->
                <div>
                    <label class="field-label" for="memo">추가 요청</label>
                    <textarea id="memo" rows="3" class="input-field" th:field="*{memo}"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}"></p>
                </div>

                <!-- 12. 개인정보 수집·이용 동의 -->
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="mt-1 w-4 h-4 accent-gold" th:field="*{agreedToTerms}" />
                    <span class="text-sm text-text-muted">
                        개인정보 수집·이용에 동의합니다.<br />
                        <span class="text-xs">수집 항목: 실명, 닉네임, 연락처, 이메일, 차량번호 · 보유 기간: 행사 종료 후 90일.</span>
                    </span>
                </label>
                <p class="field-error" th:if="${#fields.hasErrors('agreedToTerms')}" th:errors="*{agreedToTerms}"></p>

                <div class="pt-4 flex flex-col md:flex-row md:justify-between gap-3">
                    <button type="submit" class="btn-cta w-full md:w-auto md:px-16">신청하기</button>
                    <a th:href="@{/party-pass/list}" class="btn-outline-gold w-full md:w-auto md:px-16 text-center">신청확인</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
