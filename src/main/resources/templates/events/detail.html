<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${eventCard?.title}">이벤트 상세</title>
</head>
<body>
<main layout:fragment="content">

    <section class="section-py">
        <div class="container-page max-w-3xl">

            <!-- 목록으로 돌아가기 -->
            <div class="mb-6">
                <a th:href="@{/events}" class="btn-outline-gold text-sm px-4 py-2">← 목록으로 돌아가기</a>
            </div>

            <!-- 제목 · 상태 · 기간 -->
            <div class="flex items-center gap-3 mb-3">
                <span class="inline-block px-2.5 py-1 rounded-full text-xs font-semibold shrink-0"
                      th:classappend="${eventCard.isOngoing()} ? 'bg-green-500 text-bg-primary' : 'bg-gray-500 text-white'"
                      th:text="${eventCard.status != null and !eventCard.status.isBlank()} ? ${eventCard.status} : '진행중'">진행중</span>
                <h1 class="font-heading text-2xl md:text-3xl text-gold" th:text="${eventCard.title}">이벤트명</h1>
            </div>
            <p th:if="${eventCard.period != null and !eventCard.period.isBlank()}"
               class="text-text-muted text-sm mb-8">기간: <span th:text="${eventCard.period}">2026.07.01 ~ 2026.07.31</span></p>

            <!-- 메인 배너 이미지 (없으면 ComingSoon) -->
            <div class="card overflow-hidden mb-8">
                <img th:if="${eventCard.imageUrl != null and !eventCard.imageUrl.isBlank()}"
                     th:src="@{${eventCard.imageUrl}}"
                     th:alt="${eventCard.title}"
                     class="w-full object-cover" />
                <div th:unless="${eventCard.imageUrl != null and !eventCard.imageUrl.isBlank()}"
                     class="aspect-[16/9] flex flex-col items-center justify-center text-center bg-bg-card">
                    <p class="font-display tracking-[0.4em] text-text-muted text-sm mb-2" th:text="${comingSoon?.label}">COMING SOON</p>
                    <p class="text-text-muted text-xs">이벤트 배너 이미지가 곧 공개될 예정입니다.</p>
                </div>
            </div>

            <!-- 이벤트 안내 -->
            <div th:if="${eventCard.description != null and !eventCard.description.isBlank()}" class="mb-8">
                <h2 class="font-heading text-lg text-gold mb-3">이벤트 안내</h2>
                <p class="text-text leading-relaxed whitespace-pre-line" th:text="${eventCard.description}">이벤트 안내 내용</p>
            </div>

            <!-- 참여 방법 -->
            <div th:if="${eventCard.howTo != null and !eventCard.howTo.isBlank()}" class="mb-8">
                <h2 class="font-heading text-lg text-gold mb-3">참여 방법</h2>
                <p class="text-text leading-relaxed whitespace-pre-line" th:text="${eventCard.howTo}">참여 방법 내용</p>
            </div>

            <!-- CTA 버튼 -->
            <div th:if="${eventCard.ctaLabel != null and !eventCard.ctaLabel.isBlank()}" class="text-center mt-10">
                <a th:href="${eventCard.ctaLink != null and !eventCard.ctaLink.isBlank()} ? @{${eventCard.ctaLink}} : '#'"
                   th:target="${eventCard.ctaLink != null and !eventCard.ctaLink.isBlank()} ? '_blank' : null"
                   rel="noopener noreferrer"
                   class="btn-cta w-full sm:w-auto px-10" th:text="${eventCard.ctaLabel}">쿠폰 받기</a>
            </div>

        </div>
    </section>

</main>
</body>
</html>
