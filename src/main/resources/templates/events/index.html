<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageMeta?.title}">이벤트</title>
</head>
<body>
<main layout:fragment="content">

    <section class="section-py">
        <div class="container-page max-w-5xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3"
               th:text="${pageMeta?.badge}">EVENTS</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-12"
                th:text="${pageMeta?.h1}">이벤트</h1>

            <!-- Coming Soon placeholder -->
            <div th:if="${#lists.isEmpty(eventCards)}" class="card p-12 text-center max-w-2xl mx-auto">
                <p class="font-display tracking-[0.4em] text-text-muted text-sm mb-3" th:text="${comingSoon?.label}">COMING SOON</p>
                <p class="text-text-muted" th:text="${comingSoon?.message}">행사 기간 중 진행되는 이벤트가 곧 공개될 예정입니다.</p>
                <p class="text-text-muted text-xs mt-4">SNS <span th:text="${event.instagram}">@campswingoutdoor</span> 에서 가장 먼저 안내합니다.</p>
            </div>

            <!-- 이벤트 카드 -->
            <div th:unless="${#lists.isEmpty(eventCards)}"
                 class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <article th:each="ev : ${eventCards}" class="card overflow-hidden flex flex-col">
                    <img th:if="${ev.imageUrl != null and !ev.imageUrl.isBlank()}"
                         th:src="@{${ev.imageUrl}}"
                         th:alt="${ev.title}"
                         class="w-full aspect-[3/4] object-cover" />
                    <div th:unless="${ev.imageUrl != null and !ev.imageUrl.isBlank()}"
                         class="w-full aspect-[3/4] bg-bg-card flex items-center justify-center text-text-muted text-sm">
                        이미지 준비중
                    </div>
                    <div class="p-6 text-center flex flex-col flex-1">
                        <p class="font-heading text-xl text-gold mb-1" th:text="${ev.title}">이벤트명</p>
                        <p th:if="${ev.schedule != null and !ev.schedule.isBlank()}"
                           class="text-gold-light text-sm mb-3" th:text="${ev.schedule}">일시 / 장소</p>
                        <p th:if="${ev.description != null and !ev.description.isBlank()}"
                           class="text-text-muted text-sm leading-relaxed" th:text="${ev.description}">이벤트 설명</p>
                        <a th:if="${ev.link != null and !ev.link.isBlank()}"
                           th:href="@{${ev.link}}" target="_blank" rel="noopener noreferrer"
                           class="btn-outline-gold inline-flex items-center justify-center gap-1 self-center mt-4">
                            자세히 보기 →
                        </a>
                    </div>
                </article>
            </div>
        </div>
    </section>

</main>
</body>
</html>
