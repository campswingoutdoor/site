<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>캠핑사이트 신청</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-3xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3">CAMPSITE</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6">캠핑사이트 신청</h1>
            <p class="text-center text-text-muted mb-12">
                본인 텐트로 야영. 사이트 배치를 위해 텐트 크기와 차량 대수를 알려주세요.
            </p>

            <form th:action="@{/lodging/campsite}" th:object="${form}" method="post" class="space-y-6 card p-6 md:p-8">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div>
                    <label class="field-label" for="applicantName">이름(닉네임) *</label>
                    <input id="applicantName" type="text" class="input-field" th:field="*{applicantName}" autocomplete="name" />
                    <p class="field-error" th:if="${#fields.hasErrors('applicantName')}" th:errors="*{applicantName}"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="phone">연락처 *</label>
                        <input id="phone" type="tel" class="input-field" placeholder="010-1234-5678"
                               th:field="*{phone}" autocomplete="tel" />
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="email">이메일 <span class="text-text-muted text-xs">(선택)</span></label>
                        <input id="email" type="email" class="input-field" th:field="*{email}" autocomplete="email" />
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="partySize">텐트 사용 인원 *</label>
                        <input id="partySize" type="number" min="1" max="6" class="input-field" th:field="*{partySize}" />
                        <p class="field-error" th:if="${#fields.hasErrors('partySize')}" th:errors="*{partySize}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="tentSize">텐트 크기 *</label>
                        <select id="tentSize" class="input-field" th:field="*{tentSize}">
                            <option value="" disabled th:selected="${form.tentSize == null}">선택해주세요</option>
                            <option th:each="t : ${tentSizes}" th:value="${t}"
                                    th:text="${t.name() == 'SMALL' ? '소형 (1-2인)' : (t.name() == 'MEDIUM' ? '중형 (3-4인)' : '대형 (5-6인)')}"></option>
                        </select>
                        <p class="field-error" th:if="${#fields.hasErrors('tentSize')}" th:errors="*{tentSize}"></p>
                    </div>
                </div>

                <div>
                    <label class="field-label" for="arrivalTime">도착 예정 시간대 *</label>
                    <select id="arrivalTime" class="input-field" th:field="*{arrivalTime}">
                        <option value="" disabled th:selected="${form.arrivalTime == null}">선택해주세요</option>
                        <option th:each="a : ${arrivalTimes}" th:value="${a}"
                                th:text="${a.name() == 'FRI_EVENING' ? '금요일 저녁' : (a.name() == 'SAT_MORNING' ? '토요일 오전' : '토요일 오후')}"></option>
                    </select>
                    <p class="field-error" th:if="${#fields.hasErrors('arrivalTime')}" th:errors="*{arrivalTime}"></p>
                </div>

                <div>
                    <label class="field-label">픽업버스 이용 여부 *</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{usePickupBus}" value="true" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">이용</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{usePickupBus}" value="false" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">자차 / 미이용</span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('usePickupBus')}" th:errors="*{usePickupBus}"></p>
                </div>

                <div>
                    <label class="field-label" for="memo">메모</label>
                    <textarea id="memo" rows="3" class="input-field" th:field="*{memo}"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}"></p>
                </div>

                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="mt-1 w-4 h-4 accent-gold" th:field="*{agreedToTerms}" />
                    <span class="text-sm text-text-muted">
                        개인정보 수집·이용에 동의합니다.<br />
                        <span class="text-xs">수집 항목: 이름, 연락처, 이메일 · 보유 기간: 행사 종료 후 90일.</span>
                    </span>
                </label>
                <p class="field-error" th:if="${#fields.hasErrors('agreedToTerms')}" th:errors="*{agreedToTerms}"></p>

                <div class="pt-4">
                    <button type="submit" class="btn-cta w-full md:w-auto md:px-16">캠핑사이트 신청</button>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
