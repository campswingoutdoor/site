<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>캠핑사이트 신청</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-3xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3">CAMPSITE</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6">캠핑사이트 신청</h1>
            <p class="text-center text-text-muted mb-12">
                본인 텐트로 야영하는 옵션입니다. 사이트 배치를 위해 이용 인원과 차량 정보를 알려주세요.
            </p>

            <!-- 안내 -->
            <div class="card p-6 mb-10" th:if="${!#lists.isEmpty(notices)}">
                <h2 class="font-heading text-lg text-gold mb-3">안내 사항</h2>
                <ul class="text-sm text-text-muted space-y-1 list-disc list-inside">
                    <li th:each="n : ${notices}" th:text="${n.text}">안내 문구</li>
                </ul>
            </div>

            <form th:action="@{/lodging/campsite}" th:object="${form}" method="post" class="space-y-6 card p-6 md:p-8"
                  th:attr="x-data=|{ arrival: '${form.arrivalTime != null ? form.arrivalTime : 'SAT_MORNING'}', siteFee: ${siteFee}, earlyFee: ${earlyCheckinFee} }|">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- 1. 이름(실명) / 2. 닉네임 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="realName">이름(실명) *</label>
                        <input id="realName" type="text" class="input-field" th:field="*{realName}" autocomplete="name" />
                        <p class="field-error" th:if="${#fields.hasErrors('realName')}" th:errors="*{realName}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="nickname">닉네임 *</label>
                        <input id="nickname" type="text" class="input-field" th:field="*{nickname}" autocomplete="nickname" />
                        <p class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></p>
                    </div>
                </div>

                <!-- 3. 연락처 / 4. 이메일 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="phone">연락처 *</label>
                        <input id="phone" type="tel" class="input-field" placeholder="010-1234-5678"
                               th:field="*{phone}" autocomplete="tel" />
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="email">이메일 <span class="text-text-muted text-xs">(선택)</span></label>
                        <input id="email" type="email" class="input-field" th:field="*{email}" autocomplete="email" />
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                </div>

                <!-- 5. 캠핑 사이트 이용 인원 -->
                <div>
                    <label class="field-label" for="partySize">캠핑 사이트 이용 인원 * <span class="text-text-muted text-xs">(최대 4명)</span></label>
                    <input id="partySize" type="number" min="1" max="4" class="input-field" th:field="*{partySize}" />
                    <p class="field-error" th:if="${#fields.hasErrors('partySize')}" th:errors="*{partySize}"></p>
                </div>

                <!-- 6. 입실 예정 시간 -->
                <div>
                    <label class="field-label">입실 예정 시간 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="a : ${arrivalTimes}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{arrivalTime}" th:value="${a}"
                                   @change="arrival = $event.target.value" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:text="${a.name() == 'SAT_MORNING' ? '토요일 오전 8시 이후 (기본)' : '금요일 19:00 이후 (+10,000원)'}"></span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('arrivalTime')}" th:errors="*{arrivalTime}"></p>
                </div>

                <!-- 7. 픽업버스 이용 여부 -->
                <div>
                    <label class="field-label">픽업버스 이용 여부 *</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{usePickupBus}" value="true" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">이용</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{usePickupBus}" value="false" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">미이용</span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('usePickupBus')}" th:errors="*{usePickupBus}"></p>
                </div>

                <!-- 8. 메모 -->
                <div>
                    <label class="field-label" for="memo">메모 <span class="text-text-muted text-xs">(선택)</span></label>
                    <textarea id="memo" rows="3" class="input-field" th:field="*{memo}"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}"></p>
                </div>

                <!-- 총 결제금액 자동 계산 -->
                <div class="rounded-md border border-gold/40 bg-gold/5 p-5">
                    <div class="flex items-center justify-between text-sm text-text-muted">
                        <span>캠핑 사이트 이용료</span>
                        <span x-text="siteFee.toLocaleString() + '원'">35,000원</span>
                    </div>
                    <div class="flex items-center justify-between text-sm text-text-muted mt-1" x-show="arrival === 'FRI_EVENING'" x-cloak>
                        <span>금요일 선입실 추가요금</span>
                        <span x-text="'+' + earlyFee.toLocaleString() + '원'">+10,000원</span>
                    </div>
                    <div class="flex items-center justify-between font-heading text-lg text-gold mt-3 pt-3 border-t border-gold/20">
                        <span>총 결제금액</span>
                        <span x-text="(siteFee + (arrival === 'FRI_EVENING' ? earlyFee : 0)).toLocaleString() + '원'">35,000원</span>
                    </div>
                </div>

                <!-- 9. 개인정보 수집·이용 동의 -->
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="mt-1 w-4 h-4 accent-gold" th:field="*{agreedToTerms}" />
                    <span class="text-sm text-text-muted">
                        개인정보 수집·이용에 동의합니다.<br />
                        <span class="text-xs">수집 항목: 실명, 닉네임, 연락처, 이메일 · 보유 기간: 행사 종료 후 90일.</span>
                    </span>
                </label>
                <p class="field-error" th:if="${#fields.hasErrors('agreedToTerms')}" th:errors="*{agreedToTerms}"></p>

                <div class="pt-4 flex flex-col md:flex-row md:justify-between gap-3">
                    <button type="submit" class="btn-cta w-full md:w-auto md:px-16">캠핑사이트 신청</button>
                    <a th:href="@{/lodging/campsite/list}" class="btn-outline-gold w-full md:w-auto md:px-16 text-center">신청확인</a>
                </div>
            </form>

            <!-- 입금 계좌 (신청 버튼 바로 아래) -->
            <div class="mt-8">
                <div th:replace="~{layout/fragments/deposit-account :: deposit}"></div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
