<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>도미토리 신청</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-3xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3">DORMITORY</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6">도미토리 신청</h1>
            <p class="text-center text-text-muted mb-12">
                장비 없이 편하게 묵을 수 있는 공용 숙소. 성별 구분 배정으로 안심하고 이용하세요.
            </p>

            <!-- 안내 -->
            <div class="card p-6 mb-10" th:if="${!#lists.isEmpty(notices)}">
                <h2 class="font-heading text-lg text-gold mb-3">안내 사항</h2>
                <ul class="text-sm text-text-muted space-y-1 list-disc list-inside">
                    <li th:each="n : ${notices}" th:text="${n.text}">안내 문구</li>
                </ul>
            </div>

            <!-- 입금 계좌 -->
            <div th:replace="~{layout/fragments/deposit-account :: deposit}"></div>

            <form th:action="@{/lodging/dormitory}" th:object="${form}" method="post" class="space-y-6 card p-6 md:p-8"
                  th:attr="x-data=|{ nights: '${form.nights != null ? form.nights : ''}', perNight: ${perNightFee} }|">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- 1. 이름(실명) / 2. 닉네임 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="realName">이름(실명) *</label>
                        <input id="realName" type="text" class="input-field" th:field="*{realName}" autocomplete="name" />
                        <p class="field-error" th:if="${#fields.hasErrors('realName')}" th:errors="*{realName}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="nickname">닉네임 *</label>
                        <input id="nickname" type="text" class="input-field" th:field="*{nickname}" autocomplete="nickname" />
                        <p class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></p>
                    </div>
                </div>

                <!-- 3. 연락처 / 4. 이메일 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="phone">연락처 *</label>
                        <input id="phone" type="tel" class="input-field" placeholder="010-1234-5678"
                               th:field="*{phone}" autocomplete="tel" />
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="email">이메일 <span class="text-text-muted text-xs">(선택)</span></label>
                        <input id="email" type="email" class="input-field" th:field="*{email}" autocomplete="email" />
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                </div>

                <!-- 5. 성별 -->
                <div>
                    <label class="field-label">성별 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="g : ${genders}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{gender}" th:value="${g}" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:text="${g.name() == 'MALE' ? '남성' : '여성'}"></span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></p>
                </div>

                <!-- 6. 숙박 기간 -->
                <div>
                    <label class="field-label">숙박 기간 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="n : ${nightsOptions}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{nights}" th:value="${n}"
                                   @change="nights = $event.target.value" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:switch="${n.name()}">
                                <span th:case="'ONE_NIGHT_PREPARTY'">1박 (전야제)</span>
                                <span th:case="'ONE_NIGHT_MAIN'">1박 (본파티)</span>
                                <span th:case="'TWO_NIGHTS'">2박 (전야제 + 본파티)</span>
                            </span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('nights')}" th:errors="*{nights}"></p>
                </div>

                <!-- 7. 메모 -->
                <div>
                    <label class="field-label" for="memo">메모 <span class="text-text-muted text-xs">(선택)</span></label>
                    <textarea id="memo" rows="3" class="input-field" th:field="*{memo}"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}"></p>
                </div>

                <!-- 총 결제금액 자동 계산 -->
                <div class="rounded-md border border-gold/40 bg-gold/5 p-5">
                    <div class="flex items-center justify-between text-sm text-text-muted">
                        <span>도미토리 이용료 (1박당)</span>
                        <span x-text="perNight.toLocaleString() + '원'">10,000원</span>
                    </div>
                    <div class="flex items-center justify-between font-heading text-lg text-gold mt-3 pt-3 border-t border-gold/20">
                        <span>총 결제금액</span>
                        <span x-text="(nights === 'TWO_NIGHTS' ? perNight * 2 : perNight).toLocaleString() + '원'">10,000원</span>
                    </div>
                </div>

                <!-- 8. 개인정보 수집·이용 동의 -->
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="mt-1 w-4 h-4 accent-gold" th:field="*{agreedToTerms}" />
                    <span class="text-sm text-text-muted">
                        개인정보 수집·이용에 동의합니다.<br />
                        <span class="text-xs">수집 항목: 실명, 닉네임, 연락처, 이메일 · 보유 기간: 행사 종료 후 90일.</span>
                    </span>
                </label>
                <p class="field-error" th:if="${#fields.hasErrors('agreedToTerms')}" th:errors="*{agreedToTerms}"></p>

                <div class="pt-4 flex flex-col md:flex-row md:justify-between gap-3">
                    <button type="submit" class="btn-cta w-full md:w-auto md:px-16">도미토리 신청</button>
                    <a th:href="@{/lodging/dormitory/list}" class="btn-outline-gold w-full md:w-auto md:px-16 text-center">신청확인</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
