<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>도미토리 신청</title>
</head>
<body>
<main layout:fragment="content">
    <section class="section-py">
        <div class="container-page max-w-3xl">
            <p class="text-center font-display tracking-[0.4em] text-gold text-xs mb-3">DORMITORY</p>
            <h1 class="text-center font-heading text-4xl md:text-5xl text-gold mb-6">도미토리 신청</h1>
            <p class="text-center text-text-muted mb-12">
                장비 없이 편하게 묵을 수 있는 공용 숙소. 성별 구분 배정으로 안심하고 이용하세요.
            </p>

            <form th:action="@{/lodging/dormitory}" th:object="${form}" method="post" class="space-y-6 card p-6 md:p-8">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div>
                    <label class="field-label" for="applicantName">이름 *</label>
                    <input id="applicantName" type="text" class="input-field" th:field="*{applicantName}" autocomplete="name" />
                    <p class="field-error" th:if="${#fields.hasErrors('applicantName')}" th:errors="*{applicantName}"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="field-label" for="phone">연락처 *</label>
                        <input id="phone" type="tel" class="input-field" placeholder="010-1234-5678"
                               th:field="*{phone}" autocomplete="tel" />
                        <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div>
                        <label class="field-label" for="email">이메일 *</label>
                        <input id="email" type="email" class="input-field" th:field="*{email}" autocomplete="email" />
                        <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                </div>

                <div>
                    <label class="field-label">성별 *</label>
                    <div class="flex flex-wrap gap-3">
                        <label th:each="g : ${genders}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{gender}" th:value="${g}" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:switch="${g.name()}">
                                <span th:case="'MALE'">남성</span>
                                <span th:case="'FEMALE'">여성</span>
                                <span th:case="'PREFER_NOT_TO_SAY'">선택 안 함</span>
                            </span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></p>
                </div>

                <div>
                    <label class="field-label">숙박 기간 *</label>
                    <div class="flex gap-3">
                        <label th:each="n : ${nightsOptions}" class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{nights}" th:value="${n}" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition"
                                  th:text="${n.name() == 'ONE_NIGHT' ? '1박' : '2박'}"></span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('nights')}" th:errors="*{nights}"></p>
                </div>

                <div>
                    <label class="field-label">픽업버스 이용 여부 *</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{usePickupBus}" value="true" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">이용</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" class="sr-only peer" th:field="*{usePickupBus}" value="false" />
                            <span class="inline-block px-5 py-2 rounded-md border border-gold/40 text-text-muted peer-checked:bg-gold peer-checked:text-bg-primary peer-checked:border-gold transition">자차 / 미이용</span>
                        </label>
                    </div>
                    <p class="field-error" th:if="${#fields.hasErrors('usePickupBus')}" th:errors="*{usePickupBus}"></p>
                </div>

                <div>
                    <label class="field-label" for="roommatePreference">같은 방 희망 친구</label>
                    <input id="roommatePreference" type="text" class="input-field"
                           placeholder="예: 홍길동, 김스윙" th:field="*{roommatePreference}" />
                    <p class="field-error" th:if="${#fields.hasErrors('roommatePreference')}" th:errors="*{roommatePreference}"></p>
                </div>

                <div>
                    <label class="field-label" for="memo">메모</label>
                    <textarea id="memo" rows="3" class="input-field" th:field="*{memo}"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}"></p>
                </div>

                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="mt-1 w-4 h-4 accent-gold" th:field="*{agreedToTerms}" />
                    <span class="text-sm text-text-muted">
                        개인정보 수집·이용에 동의합니다.<br />
                        <span class="text-xs">수집 항목: 이름, 연락처, 이메일 · 보유 기간: 행사 종료 후 90일.</span>
                    </span>
                </label>
                <p class="field-error" th:if="${#fields.hasErrors('agreedToTerms')}" th:errors="*{agreedToTerms}"></p>

                <div class="pt-4">
                    <button type="submit" class="btn-cta w-full md:w-auto md:px-16">도미토리 신청</button>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
