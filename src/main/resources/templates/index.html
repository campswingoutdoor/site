<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${pageMeta?.title}">홈</title>
</head>
<body>
<main layout:fragment="content">

    <!-- Hero -->
    <section class="relative overflow-hidden">
        <video id="heroVideo" class="absolute inset-0 w-full h-full object-cover md:hidden"
               autoplay muted loop playsinline webkit-playsinline preload="auto"
               th:poster="@{/img/hero-main.jpeg}"
               th:src="@{/img/camp-swing-outdoor-2025.mp4}"></video>
        <script>
            // 모바일 실기기 자동재생 보강: muted 강제 + play() 재시도(첫 터치/재포커스 시 재시도).
            // iOS/안드로이드는 muted+playsinline 이어도 첫 로드시 play()가 거부될 수 있어 방어적으로 재시도.
            (function () {
                var v = document.getElementById('heroVideo');
                if (!v) return;
                v.muted = true;
                v.setAttribute('muted', '');
                var tryPlay = function () { var p = v.play(); if (p && p.catch) p.catch(function () {}); };
                tryPlay();
                document.addEventListener('touchstart', tryPlay, { once: true });
                document.addEventListener('visibilitychange', function () { if (!document.hidden) tryPlay(); });
            })();
        </script>
        <div class="absolute inset-0 bg-gradient-to-b from-bg-primary/70 via-bg-primary/40 to-bg-primary/80 md:hidden"></div>
        <div class="container-page relative text-center pt-[30rem] md:pt-[26rem] pb-4 md:pb-24 md:bg-hero-main md:bg-cover md:bg-center">
            <p class="hidden md:block font-display tracking-[0.4em] text-gold text-xs md:text-sm mb-4"
               th:text="${pageMeta?.badge}">CAMP SWING OUTDOOR</p>
            <h1 class="hidden md:block font-display text-5xl md:text-7xl text-gold mb-6"
                style="text-shadow: 0 0 24px rgba(201,163,91,0.45);"
                th:text="${event.name}">행사명</h1>
            <p class="hidden md:block font-display text-xl md:text-2xl text-text mb-2">
                <span th:text="${#temporals.format(event.startDate, 'yyyy.MM.dd')}">2026.10.30</span>
                <span class="text-text-muted mx-2">—</span>
                <span th:text="${#temporals.format(event.endDate, 'MM.dd')}">10.31</span>
            </p>
            <p class="hidden md:block font-display text-lg text-text-muted mb-2" th:text="${event.mainVenue.name}">상주우산오토캠핑장</p>
            <p class="hidden md:block font-display italic text-gold-light text-lg md:text-xl mb-10" th:text="${event.slogan}">Swing Out Under The Stars</p>
            <p class="hidden md:block text-text-muted text-sm mb-10" th:text="${event.heroSubtitle}">Swing Dance · Camping · Music · Community</p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center mt-16 md:mt-0">
                <a th:href="@{/party-pass}" class="btn-cta">파티패스 신청</a>
                <a th:href="@{/lodging}" class="btn-outline-gold">숙박 신청</a>
            </div>

            <!-- 신청 확인 바로가기 -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center mt-4">
                <a th:href="@{/party-pass/list}" class="btn-plum">파티패스 신청확인</a>
                <a th:href="@{/lodging/campsite/list}" class="btn-plum">캠핑 신청확인</a>
                <a th:href="@{/lodging/dormitory/list}" class="btn-plum">도미 신청확인</a>
            </div>

            <a th:href="@{/event/overview}" class="inline-block mt-10 text-gold hover:text-gold-light transition">
                행사 자세히 보기 →
            </a>
        </div>
    </section>

    <!-- 행사 핵심 정보 -->
    <section class="section-py bg-bg-secondary border-y border-gold/10" th:if="${!#lists.isEmpty(indexHighlights)}">
        <div class="container-page">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                <div th:each="h : ${indexHighlights}">
                    <p class="font-display text-gold tracking-widest text-sm mb-3" th:text="${h.label}">WHEN</p>

                    <!-- WHEN: 날짜 자동, mainText 비면 이벤트 날짜 사용 -->
                    <th:block th:if="${h.key == 'when'}">
                        <p class="text-2xl text-text">
                            <span th:text="${#temporals.format(event.startDate, 'yyyy.MM.dd')}">2026.10.30</span>
                            ~
                            <span th:text="${#temporals.format(event.endDate, 'MM.dd')}">10.31</span>
                        </p>
                        <p class="text-text-muted text-sm mt-1" th:text="${h.subtext}">금요일 전야제 · 토요일 메인</p>
                    </th:block>

                    <!-- WHERE: mainText 비면 메인 장소 이름 사용 -->
                    <th:block th:if="${h.key == 'where'}">
                        <p class="text-2xl text-text"
                           th:text="${h.mainText != null and !h.mainText.isEmpty()} ? ${h.mainText} : ${event.mainVenue.name}">상주우산오토캠핑장</p>
                        <p class="text-text-muted text-sm mt-1"
                           th:text="${h.subtext != null and !h.subtext.isEmpty()} ? ${h.subtext} : ${event.mainVenue.address}">경북 상주시 외서면 우산리 223-3</p>
                    </th:block>

                    <!-- PRE-PARTY: mainText 비면 전야제 장소 이름 사용 -->
                    <th:block th:if="${h.key == 'preParty'}">
                        <p class="text-2xl text-text"
                           th:text="${h.mainText != null and !h.mainText.isEmpty()} ? ${h.mainText} : ${event.prePartyVenue.name}">느티나무 카페</p>
                        <p class="text-text-muted text-sm mt-1" th:text="${h.subtext}">10.30 BLUES PARTY</p>
                    </th:block>
                </div>
            </div>
        </div>
    </section>

</main>
</body>
</html>
