<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>홈</title>
</head>
<body>
<main layout:fragment="content">

    <!-- Hero -->
    <section class="relative">
        <div class="container-page text-center pt-40 pb-24 bg-hero-main md:bg-hero-main bg-cover bg-center">
            <p class="font-display tracking-[0.4em] text-gold text-xs md:text-sm mb-4">CAMP SWING OUTDOOR</p>
            <h1 class="font-display text-5xl md:text-7xl text-gold mb-6"
                style="text-shadow: 0 0 24px rgba(201,163,91,0.45);"
                th:text="${event.name}">행사명</h1>
            <p class="text-xl md:text-2xl text-text mb-2">
                <span th:text="${#temporals.format(event.startDate, 'yyyy.MM.dd')}">2026.10.30</span>
                <span class="text-text-muted mx-2">—</span>
                <span th:text="${#temporals.format(event.endDate, 'MM.dd')}">10.31</span>
            </p>
            <p class="text-lg text-text-muted mb-2" th:text="${event.mainVenue.name}">상주우산오토캠핑장</p>
            <p class="font-display italic text-gold-light text-lg md:text-xl mb-10" th:text="${event.slogan}">Swing Out Under The Stars</p>
            <p class="text-text-muted text-sm mb-10" th:text="${event.heroSubtitle}">Swing Dance · Camping · Music · Community</p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a th:href="@{/party-pass}" class="btn-cta">파티패스 신청</a>
                <a th:href="@{/lodging}" class="btn-outline-gold">숙박 신청</a>
            </div>

            <a th:href="@{/event/overview}" class="inline-block mt-10 text-gold hover:text-gold-light transition">
                행사 자세히 보기 →
            </a>
        </div>
    </section>

    <!-- 행사 핵심 정보 -->
    <section class="section-py bg-bg-secondary border-y border-gold/10">
        <div class="container-page">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                <div>
                    <p class="font-display text-gold tracking-widest text-sm mb-3">WHEN</p>
                    <p class="text-2xl text-text">
                        <span th:text="${#temporals.format(event.startDate, 'yyyy.MM.dd')}">2026.10.30</span>
                        ~
                        <span th:text="${#temporals.format(event.endDate, 'MM.dd')}">10.31</span>
                    </p>
                    <p class="text-text-muted text-sm mt-1">금요일 전야제 · 토요일 메인</p>
                </div>
                <div>
                    <p class="font-display text-gold tracking-widest text-sm mb-3">WHERE</p>
                    <p class="text-2xl text-text" th:text="${event.mainVenue.name}">상주우산오토캠핑장</p>
                    <p class="text-text-muted text-sm mt-1" th:text="${event.mainVenue.address}">경북 상주시 외서면 우산리 223-3</p>
                </div>
                <div>
                    <p class="font-display text-gold tracking-widest text-sm mb-3">PRE-PARTY</p>
                    <p class="text-2xl text-text" th:text="${event.prePartyVenue.name}">느티나무 카페</p>
                    <p class="text-text-muted text-sm mt-1">10.30 BLUES PARTY</p>
                </div>
            </div>
        </div>
    </section>

</main>
</body>
</html>
